<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milesight Troubleshooting Tree</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f9fb;
    --card-bg: #ffffff;
    --text: #1a1d23;
    --text-secondary: #5f6b7a;
    --border: #e5e8ed;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --success: #16a34a;
    --success-light: #f0fdf4;
    --warning: #ea580c;
    --warning-light: #fff7ed;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 6px rgba(0,0,0,.04), 0 12px 32px rgba(0,0,0,.06);
    --transition: 0.25s cubic-bezier(.4,0,.2,1);
    --connector: #d1d5dc;
    --connector-active: #2563eb;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .header {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,.88);
  }
  .header-brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .header-logo { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }
  .header-badge { font-size: 12px; color: var(--text-secondary); background: var(--bg); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }

  .main {
    max-width: 1300px; margin: 0 auto;
    height: calc(100vh - 140px); overflow: hidden; position: relative;
    cursor: grab; border-radius: var(--radius); background: var(--bg);
  }
  .main.grabbing { cursor: grabbing; }

  .zoom-layer {
    transform-origin: 0 0; transition: none;
    position: absolute; top: 0; left: 0;
    padding: 48px 32px 100px; min-width: 100%;
  }
  .zoom-layer.animating { transition: transform 0.35s cubic-bezier(.4,0,.2,1); }

  .tree-root { display: flex; flex-direction: column; align-items: center; min-width: fit-content; }

  /* Minimap */
  .minimap {
    position: fixed; left: 24px; top: 100px; z-index: 200;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow-lg);
    padding: 12px; width: 170px; transition: width 0.3s ease, padding 0.3s ease;
  }
  .minimap.collapsed { width: 42px; padding: 8px; }
  .minimap-toggle {
    position: absolute; top: -1px; right: -1px; width: 24px; height: 24px;
    border: 1px solid var(--border); border-radius: 0 var(--radius) 0 var(--radius-sm);
    background: var(--card-bg); cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 12px; color: var(--text-secondary); z-index: 2; line-height: 1;
  }
  .minimap-toggle:hover { background: var(--bg); }
  .minimap-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-secondary); margin-bottom: 8px; text-align: center; white-space: nowrap; overflow: hidden; }
  .minimap.collapsed .minimap-label, .minimap.collapsed .minimap-svg { display: none; }
  .minimap-svg { display: block; width: 100%; }
  .minimap-node, .minimap-link { transition: all 0.35s ease; }

  /* Zoom controls */
  .zoom-controls { position: absolute; bottom: 20px; right: 20px; z-index: 50; display: flex; flex-direction: column; gap: 4px; }
  .zoom-ctrl-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); box-shadow: var(--shadow-sm); font-family: inherit; line-height: 1; }
  .zoom-ctrl-btn:hover { background: var(--bg); border-color: #cdd3dc; box-shadow: var(--shadow); }
  .zoom-level { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-align: center; padding: 2px 0; user-select: none; }

  /* Node cards */
  .node-wrapper { display: flex; flex-direction: column; align-items: center; flex: 0 0 auto; padding: 0 10px; }
  #treeRoot > .level-row > .node-wrapper { width: 100%; max-width: 460px; padding: 0; }
  .node-card { width: 380px; max-width: 100%; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); transition: all var(--transition); cursor: pointer; position: relative; overflow: hidden; }
  .node-card:hover { box-shadow: var(--shadow); border-color: #cdd3dc; }
  .node-card.active { border-color: var(--accent); box-shadow: var(--shadow-lg); cursor: default; }
  .node-card.resolved { border-color: var(--success); background: var(--success-light); }

  .node-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; user-select: none; }
  .node-step-num { width: 34px; height: 34px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; transition: all var(--transition); }
  .node-card.active .node-step-num { background: var(--accent); color: #fff; }
  .node-card.resolved .node-step-num { background: var(--success); color: #fff; }
  .node-title-area { flex: 1; min-width: 0; }
  .node-title { font-size: 14px; font-weight: 600; letter-spacing: -.01em; line-height: 1.3; }
  .node-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.3; }
  .node-chevron { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: transform var(--transition); flex-shrink: 0; }
  .node-card.active .node-chevron { transform: rotate(180deg); }

  .node-body { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(.4,0,.2,1); }
  .node-card.active .node-body { max-height: 50000px; }
  .node-body-inner { padding: 0 20px 20px; border-top: 1px solid var(--border); }

  .problem-desc { margin-top: 16px; padding: 12px 16px; background: var(--bg); border-radius: var(--radius-sm); font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
  .problem-desc strong { color: var(--text); }
  .problem-desc code { background: #e5e7eb; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .problem-desc img { max-width: 100%; height: auto; border-radius: var(--radius-sm); margin: 8px 0; display: block; cursor: zoom-in; }
  .problem-desc img:hover { box-shadow: 0 0 0 2px var(--accent); }

  .solution-section { margin-top: 14px; }
  .solution-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); margin-bottom: 10px; }
  .solution-steps { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .solution-steps li { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; line-height: 1.6; padding: 10px 12px; background: var(--accent-light); border-radius: var(--radius-sm); border: 1px solid #dbeafe; }
  .solution-steps li img { max-width: 100%; height: auto; border-radius: var(--radius-sm); margin: 6px 0; cursor: zoom-in; }
  .solution-steps li img:hover { box-shadow: 0 0 0 2px var(--accent); }

  /* ── Image Lightbox ── */
  .lightbox-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: lbFadeIn .25s ease;
    cursor: zoom-out;
  }
  .lightbox-overlay.closing { animation: lbFadeOut .2s ease forwards; }

  .lightbox-img-wrap {
    position: relative;
    max-width: 95vw;
    max-height: 92vh;
    overflow: hidden;
    border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(0,0,0,.4);
    cursor: default;
    transform-origin: center center;
    transition: transform 0.15s ease;
  }
  .lightbox-img-wrap img {
    display: block;
    max-width: 90vw;
    max-height: 88vh;
    object-fit: contain;
    border-radius: var(--radius);
    user-select: none;
    -webkit-user-drag: none;
  }

  .lightbox-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,.5);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition);
    z-index: 10;
  }
  .lightbox-close:hover { background: rgba(255,255,255,.25); }

  .lightbox-toolbar {
    position: absolute;
    bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px;
    background: rgba(0,0,0,.5);
    padding: 6px 12px;
    border-radius: 20px;
    z-index: 10;
  }
  .lb-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,.15);
    color: #fff;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition);
  }
  .lb-btn:hover { background: rgba(255,255,255,.35); }
  .lb-zoom-label {
    font-size: 12px; font-weight: 600; color: #fff;
    display: flex; align-items: center;
    padding: 0 6px; user-select: none;
  }

  .lightbox-hint {
    position: absolute;
    bottom: 60px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,.5);
    text-align: center;
    pointer-events: none;
    animation: lbHintFade 2s ease 1s forwards;
  }

  @keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes lbFadeOut { from { opacity: 1; } to { opacity: 0; } }
  @keyframes lbHintFade { from { opacity: 1; } to { opacity: 0; } }
  .solution-steps .step-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }

  .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; transition: all var(--transition); font-family: inherit; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn-resolved { background: var(--success); color: #fff; border-color: var(--success); font-weight: 600; }
  .btn-resolved:hover { background: #15803d; border-color: #15803d; }
  .btn-next { background: var(--warning); color: #fff; border-color: var(--warning); font-weight: 600; }
  .btn-next:hover { background: #c2410c; border-color: #c2410c; }
  .btn-reset { color: var(--text-secondary); border-color: transparent; background: transparent; padding: 6px 12px; font-size: 12px; }
  .btn-reset:hover { background: var(--bg); border-color: var(--border); }

  /* Connectors */
  .stem { width: 2px; height: 0; background: var(--connector); flex-shrink: 0; transition: height 0.3s ease, background 0.3s ease; }
  .stem.show { height: 24px; }
  .stem.active { background: var(--connector-active); }

  .children-row { display: none; flex-direction: row; flex-wrap: nowrap; align-items: flex-start; justify-content: center; position: relative; padding-top: 24px; }
  .children-row.show { display: flex; }
  .children-row::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--connector); transition: background 0.3s ease; }
  .children-row.active::before { background: var(--connector-active); }
  .children-row > .node-wrapper::before { content: ''; display: block; width: 2px; height: 24px; background: var(--connector); margin: 0 auto; flex-shrink: 0; transition: background 0.3s ease; }
  .children-row.active > .node-wrapper::before { background: var(--connector-active); }

  /* Banners */
  .result-banner { width: 100%; border-radius: var(--radius); padding: 24px 20px; text-align: center; display: none; animation: fadeIn .4s ease; margin-top: 16px; }
  .result-banner.show { display: block; }
  .result-banner.success { background: var(--success-light); border: 1px solid #bbf7d0; }
  .result-banner.escalated { background: #fff7ed; border: 1px solid #fed7aa; }
  .result-icon { width: 44px; height: 44px; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
  .result-banner.success .result-icon { background: var(--success); }
  .result-banner.escalated .result-icon { background: var(--warning); }
  .result-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .result-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6; }

  .level-row { display: flex; flex-direction: column; align-items: center; width: 100%; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .level-row { animation: fadeIn .35s ease both; }
  .children-row > .node-wrapper { animation: fadeIn .35s ease both; }
  .children-row > .node-wrapper:nth-child(1) { animation-delay: 0.05s; }
  .children-row > .node-wrapper:nth-child(2) { animation-delay: 0.1s; }
  .children-row > .node-wrapper:nth-child(3) { animation-delay: 0.15s; }

  @media (max-width: 1100px) { .minimap { left: 8px; top: 80px; width: 140px; padding: 8px; } .minimap-label { font-size: 9px; } }
  @media (max-width: 960px) {
    .main { height: auto; overflow: visible; cursor: default; }
    .zoom-layer { position: static; padding: 24px 16px 60px; transform: none !important; }
    .zoom-controls { display: none; }
    .children-row { flex-direction: column; align-items: center; padding-top: 0; overflow-x: visible; }
    .children-row::before { display: none; }
    .children-row > .node-wrapper::before { display: none; }
    .children-row > .node-wrapper { width: 100%; max-width: 460px; flex: 0 0 auto; }
    .stem { display: none; }
    .minimap { display: none; }
  }
  @media (max-width: 640px) {
    .header { padding: 12px 16px; }
    .main { padding: 0; }
    .node-header { padding: 14px 16px; }
    .node-body-inner { padding: 0 16px 16px; }
    .actions { flex-direction: column; }
    .btn { justify-content: center; }
    .node-wrapper { width: 100%; max-width: 100%; flex: 0 0 auto; }
    #treeRoot > .level-row > .node-wrapper { max-width: 100%; }
    .node-card { width: 100%; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand"><div class="header-logo">M</div>Milesight Troubleshooting Tree</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="header-badge" id="stepBadge">Step 1</span>
    <button id="langToggle" class="btn" style="padding:4px 10px;font-size:12px;border-radius:20px;" title="Switch Language">中</button>
  </div>
</header>

<div class="minimap" id="minimap">
  <button class="minimap-toggle" id="minimapToggle">−</button>
  <div class="minimap-label">Overview</div>
  <svg class="minimap-svg" id="minimapSvg"></svg>
</div>

<main class="main" id="treeRoot"></main>

<script src="tree-data.js"></script>
<script>
// ============================================================
// STATE
// ============================================================
let currentLang   = 'en';
let treeData      = treeContent[currentLang];
let T             = uiText[currentLang];
let resolvedNodeId = null;
let activePath    = ['root'];
let expandedNodes = {};
let zoomScale = 1, zoomTx = 0, zoomTy = 0;
let isPanning = false;
const MIN_ZOOM = 0.3, MAX_ZOOM = 2.5;

const treeRootEl = document.getElementById('treeRoot');
const stepBadge  = document.getElementById('stepBadge');

// ============================================================
// UTILS
// ============================================================
function findNodeById(id, node = treeData) {
  if (node.id === id) return node;
  if (node.children) for (const c of node.children) { const f = findNodeById(id, c); if (f) return f; }
  return null;
}
function countLeaves(node) {
  if (!node.children || node.children.length === 0) return 1;
  return node.children.reduce((s, c) => s + countLeaves(c), 0);
}
function getDepth(node, current = treeData, d = 0) {
  if (current.id === node.id) return d;
  if (current.children) for (const c of current.children) { const r = getDepth(node, c, d + 1); if (r >= 0) return r; }
  return -1;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  treeRootEl.innerHTML = '';
  treeData      = treeContent[currentLang];
  T             = uiText[currentLang];
  resolvedNodeId = null;
  activePath     = ['root'];
  expandedNodes  = {};
  document.getElementById('langToggle').textContent = currentLang === 'en' ? '中' : 'EN';
  document.querySelector('.minimap-label').textContent = T.minimap;

  const zoomLayer = document.createElement('div');
  zoomLayer.className = 'zoom-layer';
  zoomLayer.id = 'zoomLayer';

  const treeRootDiv = document.createElement('div');
  treeRootDiv.className = 'tree-root';
  const rootWrapper = buildNodeWrapper(treeData, 0);
  const levelRow = document.createElement('div');
  levelRow.className = 'level-row';
  levelRow.appendChild(rootWrapper);
  treeRootDiv.appendChild(levelRow);
  zoomLayer.appendChild(treeRootDiv);

  const zoomCtrls = document.createElement('div');
  zoomCtrls.className = 'zoom-controls';
  zoomCtrls.id = 'zoomControls';
  zoomCtrls.innerHTML = '<button class="zoom-ctrl-btn" id="btnZoomIn" title="Zoom in">+</button><div class="zoom-level" id="zoomLevel">100%</div><button class="zoom-ctrl-btn" id="btnZoomOut" title="Zoom out">−</button><button class="zoom-ctrl-btn" id="btnZoomReset" title="Reset view" style="font-size:12px;">↺</button>';
  treeRootEl.appendChild(zoomCtrls);
  treeRootEl.appendChild(zoomLayer);

  zoomScale = 1; zoomTx = 0; zoomTy = 0;
  applyZoom(true);

  document.getElementById('btnZoomIn').addEventListener('click', (e) => { e.stopPropagation(); zoomTowards(treeRootEl.clientWidth / 2, treeRootEl.clientHeight / 2, 0.15); });
  document.getElementById('btnZoomOut').addEventListener('click', (e) => { e.stopPropagation(); zoomTowards(treeRootEl.clientWidth / 2, treeRootEl.clientHeight / 2, -0.15); });
  document.getElementById('btnZoomReset').addEventListener('click', (e) => { e.stopPropagation(); zoomScale = 1; zoomTx = 0; zoomTy = 0; applyZoom(true); });

  updateMinimap();
  updateBadge(T.badge.step + ' 1');
}

function buildNodeWrapper(node, depth) {
  const wrapper = document.createElement('div');
  wrapper.className = 'node-wrapper';
  wrapper.dataset.nodeId = node.id;

  const card = document.createElement('div');
  card.className = 'node-card';
  card.id = `card-${node.id}`;

  const header = document.createElement('div');
  header.className = 'node-header';
  header.addEventListener('click', (e) => { e.stopPropagation(); toggleNode(node, card); });

  const num = document.createElement('div');
  num.className = 'node-step-num';
  num.textContent = depth + 1;

  const titleArea = document.createElement('div');
  titleArea.className = 'node-title-area';
  const titleEl = document.createElement('div');
  titleEl.className = 'node-title';
  titleEl.textContent = node.title;
  titleArea.appendChild(titleEl);
  if (node.subtitle && node.subtitle.trim()) {
    const subEl = document.createElement('div');
    subEl.className = 'node-subtitle';
    subEl.textContent = node.subtitle;
    titleArea.appendChild(subEl);
  }

  const chevron = document.createElement('div');
  chevron.className = 'node-chevron';
  chevron.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  header.appendChild(num);
  header.appendChild(titleArea);
  header.appendChild(chevron);

  const body = document.createElement('div');
  body.className = 'node-body';
  const bodyInner = document.createElement('div');
  bodyInner.className = 'node-body-inner';

  if (node.problem && node.problem.trim()) {
    const problemDesc = document.createElement('div');
    problemDesc.className = 'problem-desc';
    problemDesc.innerHTML = node.problem;
    bodyInner.appendChild(problemDesc);
  }

  if (node.solution && node.solution.length > 0) {
    const solSection = document.createElement('div');
    solSection.className = 'solution-section';
    const solLabel = document.createElement('div');
    solLabel.className = 'solution-label';
    solLabel.textContent = T.solution;
    solSection.appendChild(solLabel);

    const stepsList = document.createElement('ul');
    stepsList.className = 'solution-steps';
    node.solution.forEach(s => {
      const li = document.createElement('li');
      const dot = document.createElement('span');
      dot.className = 'step-dot';
      li.appendChild(dot);
      // Use innerHTML to support <img> and other HTML tags in solution text
      const textSpan = document.createElement('span');
      textSpan.innerHTML = s;
      li.appendChild(textSpan);
      stepsList.appendChild(li);
    });
    solSection.appendChild(stepsList);
    bodyInner.appendChild(solSection);
  }

  const actions = document.createElement('div');
  actions.className = 'actions';

  const hasChildren = node.children && node.children.length > 0;

  if (depth === 0) {
    // Root card: single "Start" button
    const btnStart = document.createElement('button');
    btnStart.className = 'btn btn-next';
    btnStart.textContent = T.buttons.start;
    btnStart.addEventListener('click', (e) => { e.stopPropagation(); proceedToChildren(node, card, wrapper); });
    actions.appendChild(btnStart);
  } else {
    const btnResolved = document.createElement('button');
    btnResolved.className = 'btn btn-resolved';
    btnResolved.textContent = T.buttons.resolved;
    btnResolved.addEventListener('click', (e) => { e.stopPropagation(); markResolved(node, card, wrapper); });

    const btnNext = document.createElement('button');
    btnNext.className = 'btn btn-next';
    btnNext.textContent = hasChildren ? T.buttons.next : T.buttons.noMore;
    btnNext.addEventListener('click', (e) => { e.stopPropagation(); if (hasChildren) { proceedToChildren(node, card, wrapper); } else { showNoMoreSteps(wrapper, node); } });

    actions.appendChild(btnResolved);
    actions.appendChild(btnNext);
  }
  bodyInner.appendChild(actions);
  body.appendChild(bodyInner);

  card.appendChild(header);
  card.appendChild(body);
  wrapper.appendChild(card);

  const stem = document.createElement('div');
  stem.className = 'stem';
  stem.id = `stem-${node.id}`;
  wrapper.appendChild(stem);

  const childrenRow = document.createElement('div');
  childrenRow.className = 'children-row';
  childrenRow.id = `children-${node.id}`;
  if (hasChildren) { node.children.forEach(child => { childrenRow.appendChild(buildNodeWrapper(child, depth + 1)); }); }
  wrapper.appendChild(childrenRow);

  const successBanner = document.createElement('div');
  successBanner.className = 'result-banner success';
  successBanner.id = `success-${node.id}`;
  successBanner.innerHTML = `<div class="result-icon">✓</div><div class="result-title">${T.banners.resolved.title}</div><div class="result-subtitle">${node.title} ${T.banners.resolved.subtitle}</div><button class="btn btn-reset" onclick="resetTree()">${T.buttons.reset}</button>`;
  wrapper.appendChild(successBanner);

  const noMoreBanner = document.createElement('div');
  noMoreBanner.className = 'result-banner escalated';
  noMoreBanner.id = `nomore-${node.id}`;
  noMoreBanner.innerHTML = `<div class="result-icon">!</div><div class="result-title">${T.banners.escalated.title}</div><div class="result-subtitle">${T.banners.escalated.subtitle}</div><a href="https://www.milesight.com/support/technical-support" target="_blank" class="btn btn-next" style="text-decoration:none;display:inline-flex;margin-right:8px;">${T.banners.escalated.linkText}</a><button class="btn btn-reset" onclick="copyDiagnosticPath(this)">${T.buttons.copyPath}</button><button class="btn btn-reset" onclick="resetTree()" style="margin-top:8px;">${T.buttons.reset}</button>`;
  wrapper.appendChild(noMoreBanner);

  return wrapper;
}

// ============================================================
// DYNAMIC HEIGHT — ensures all content is fully visible
// ============================================================
function expandNodeBody(card) {
  const body = card.querySelector('.node-body');
  if (!body) return;
  // scrollHeight returns full content height even while hidden (max-height:0 + overflow:hidden)
  const height = body.scrollHeight;
  // Override CSS fallback (50000px) with the exact measured height for smooth animation
  // Start from 0: first override CSS active rule back to 0, force reflow, then animate to target
  body.style.maxHeight = '0px';
  body.offsetHeight; // force reflow — browser registers start state as 0
  body.style.maxHeight = height + 'px'; // transition to measured height
  // After animation completes, remove the constraint entirely so content can grow freely
  // (e.g. when images that were not yet rendered finally load)
  const onEnd = () => {
    body.style.maxHeight = 'none';
    body.removeEventListener('transitionend', onEnd);
  };
  body.addEventListener('transitionend', onEnd);
  setTimeout(() => { // fallback in case transitionend doesn't fire
    body.style.maxHeight = 'none';
    body.removeEventListener('transitionend', onEnd);
  }, 500);
}

function collapseNodeBody(card) {
  const body = card.querySelector('.node-body');
  if (!body) return;
  // Set max-height to current scrollHeight so transition has a concrete start point
  // (inline 'none' can't transition, so we pin it first)
  body.style.transition = 'none';
  body.style.maxHeight = body.scrollHeight + 'px';
  body.offsetHeight; // force reflow
  body.style.transition = ''; // restore CSS transition
  body.style.maxHeight = '0px'; // animate collapse
  // Clean up inline style after animation
  const onEnd = () => {
    body.style.maxHeight = '';
    body.removeEventListener('transitionend', onEnd);
  };
  body.addEventListener('transitionend', onEnd);
  setTimeout(() => {
    body.style.maxHeight = '';
    body.removeEventListener('transitionend', onEnd);
  }, 500);
}

// When images inside an expanded node finish loading, recalculate max-height
treeRootEl.addEventListener('load', (e) => {
  if (e.target.tagName !== 'IMG') return;
  const card = e.target.closest('.node-card');
  if (!card || !card.classList.contains('active')) return;
  const body = card.querySelector('.node-body');
  if (!body) return;
  // If max-height is 'none' (constraint removed), no update needed — content grows freely
  // If max-height is still a fixed value (animation in progress), update to new scrollHeight
  if (body.style.maxHeight && body.style.maxHeight !== 'none' && body.style.maxHeight !== '') {
    body.style.maxHeight = body.scrollHeight + 'px';
  }
}, true); // capture phase to catch img load events before they bubble

// ============================================================
// ACTIONS
// ============================================================
function toggleNode(node, card) {
  if (resolvedNodeId) return;
  if (card.classList.contains('active')) {
    collapseNodeBody(card);
    card.classList.remove('active');
    expandedNodes[node.id] = false;
  } else {
    card.classList.add('active');
    expandedNodes[node.id] = true;
    expandNodeBody(card);
    if (getDepth(node) > 0) { setTimeout(() => panToElement(card, true), 350); }
  }
}

function markResolved(node, card, wrapper) {
  resolvedNodeId = node.id;
  const wasActive = card.classList.contains('active');
  card.classList.add('active', 'resolved');
  expandedNodes[node.id] = true;
  if (!activePath.includes(node.id)) activePath.push(node.id);
  if (!wasActive) expandNodeBody(card);
  const stem = wrapper.querySelector(`#stem-${node.id}`);
  if (stem) stem.classList.remove('show');
  const crow = wrapper.querySelector(`#children-${node.id}`);
  if (crow) crow.classList.remove('show');
  const sb = wrapper.querySelector(`#success-${node.id}`);
  if (sb) { sb.classList.add('show'); setTimeout(() => panToElement(sb, true), 150); }
  updateBadge(T.badge.resolved);
  updateMinimap();
}

function proceedToChildren(node, card, wrapper) {
  const wasActive = card.classList.contains('active');
  card.classList.add('active');
  expandedNodes[node.id] = true;
  if (!activePath.includes(node.id)) activePath.push(node.id);
  if (!wasActive) expandNodeBody(card);
  const stem = wrapper.querySelector(`#stem-${node.id}`);
  if (stem) { stem.classList.add('show'); stem.classList.add('active'); }
  const crow = wrapper.querySelector(`#children-${node.id}`);
  if (crow) { crow.classList.add('show'); crow.classList.add('active'); setTimeout(() => panToElement(crow, true), 150); }
  updateBadge(T.badge.step + ' ' + (getDepth(node) + 2));
  updateMinimap();
}

function showNoMoreSteps(wrapper, node) {
  if (!activePath.includes(node.id)) activePath.push(node.id);
  expandedNodes[node.id] = true;
  const nb = wrapper.querySelector('[id^="nomore-"]');
  if (nb) { nb.classList.add('show'); setTimeout(() => panToElement(nb, true), 150); }
  updateBadge(T.badge.escalated);
  updateMinimap();
}

function panToElement(el, animate = true) {
  const mainRect = treeRootEl.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  zoomTx += (mainRect.left + mainRect.width / 2) - (elRect.left + elRect.width / 2);
  zoomTy += (mainRect.top + mainRect.height / 2) - (elRect.top + elRect.height / 2);
  applyZoom(animate);
}

function resetTree() { render(); }
function updateBadge(text) { stepBadge.textContent = text; }

function copyDiagnosticPath(btnEl) {
  const lines = [];
  lines.push('Milesight Troubleshooting Tree — Diagnostic Path');
  lines.push('='.repeat(50));

  // Walk the active path and list all visited nodes with depth
  const visited = [];
  function walk(node, depth) {
    const isVisited = activePath.includes(node.id);
    const isExpanded = expandedNodes[node.id];
    if (isVisited) {
      const indent = '  '.repeat(depth);
      const marker = isExpanded ? '▸' : '✓';
      lines.push(`${indent}${marker} ${node.title}`);
    }
    if (node.children && isExpanded) {
      node.children.forEach(c => walk(c, depth + 1));
    }
  }
  walk(treeData, 0);

  lines.push('='.repeat(50));
  const badgeText = stepBadge.textContent;
  lines.push(`Result: ${badgeText}`);
  lines.push(`Date: ${new Date().toISOString().split('T')[0]}`);
  lines.push(`Language: ${currentLang.toUpperCase()}`);

  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const orig = btnEl.textContent;
    btnEl.textContent = T.buttons.copied;
    btnEl.style.color = 'var(--success)';
    setTimeout(() => { btnEl.textContent = orig; btnEl.style.color = ''; }, 2000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btnEl.textContent = T.buttons.copied;
    setTimeout(() => { btnEl.textContent = T.buttons.copyPath; }, 1500);
  });
}

function navigateToNode(nodeId) {
  if (resolvedNodeId) return;
  const chain = [];
  (function findChain(id, node) { if (node.id === id) { chain.push(node); return true; } if (node.children) { for (const c of node.children) { if (findChain(id, c)) { chain.push(node); return true; } } } return false; })(nodeId, treeData);
  chain.reverse();
  for (let i = 0; i < chain.length - 1; i++) {
    const n = chain[i];
    const w = document.querySelector(`.node-wrapper[data-node-id="${n.id}"]`);
    if (!w) continue;
    const c = w.querySelector('.node-card');
    if (c && !c.classList.contains('active')) { c.classList.add('active'); expandedNodes[n.id] = true; expandNodeBody(c); }
    const st = w.querySelector(`#stem-${n.id}`);
    if (st) { st.classList.add('show', 'active'); }
    const cr = w.querySelector(`#children-${n.id}`);
    if (cr) { cr.classList.add('show', 'active'); }
    if (!activePath.includes(n.id)) activePath.push(n.id);
  }
  const targetNode = chain[chain.length - 1];
  const targetCard = document.getElementById(`card-${targetNode.id}`);
  if (targetCard && !targetCard.classList.contains('active')) { targetCard.classList.add('active'); expandedNodes[targetNode.id] = true; expandNodeBody(targetCard); }
  if (!activePath.includes(targetNode.id)) activePath.push(targetNode.id);
  updateMinimap();
  updateBadge(T.badge.step + ' ' + (getDepth(targetNode) + 1));
  setTimeout(() => { if (targetCard) panToElement(targetCard, true); }, 350);
}

// ============================================================
// MINIMAP
// ============================================================
const minimapSvg    = document.getElementById('minimapSvg');
const minimapEl     = document.getElementById('minimap');
const minimapToggle = document.getElementById('minimapToggle');
minimapToggle.addEventListener('click', () => { minimapEl.classList.toggle('collapsed'); minimapToggle.textContent = minimapEl.classList.contains('collapsed') ? '+' : '−'; });

function updateMinimap() {
  const W = 146, H = 280, levelGap = 48, nodeR = 5;
  const rootX = W / 2, rootY = 16;
  minimapSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  minimapSvg.innerHTML = '';

  const positions = [];
  (function layout(node, x, y, width, depth) {
    const leaves = countLeaves(node);
    const cx = x + width / 2;
    const entry = { id: node.id, x: cx, y, depth, children: [] };
    positions.push(entry);
    if (node.children && node.children.length > 0) {
      const cy = y + levelGap; let cx2 = x;
      node.children.forEach(ch => { const cw = (countLeaves(ch) / leaves) * width; entry.children.push({ x: cx2 + cw / 2, y: cy }); layout(ch, cx2, cy, cw, depth + 1); cx2 += cw; });
    }
  })(treeData, 10, rootY, W - 20, 0);

  positions.forEach(p => { p.children.forEach(cp => { const line = document.createElementNS('http://www.w3.org/2000/svg', 'line'); line.setAttribute('x1', p.x); line.setAttribute('y1', p.y + nodeR); line.setAttribute('x2', cp.x); line.setAttribute('y2', cp.y - nodeR); line.setAttribute('stroke', 'var(--connector)'); line.setAttribute('stroke-width', '1'); line.classList.add('minimap-link'); minimapSvg.appendChild(line); }); });

  const currentId = activePath[activePath.length - 1] || 'root';
  positions.forEach(p => {
    const hitArea = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    hitArea.setAttribute('cx', p.x); hitArea.setAttribute('cy', p.y); hitArea.setAttribute('r', nodeR + 6);
    hitArea.setAttribute('fill', 'transparent'); hitArea.setAttribute('stroke', 'none'); hitArea.style.cursor = 'pointer';
    const nodeData = findNodeById(p.id);
    const tooltip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
    tooltip.textContent = nodeData ? nodeData.title : p.id;
    hitArea.appendChild(tooltip);
    minimapSvg.appendChild(hitArea);

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', p.x); circle.setAttribute('cy', p.y); circle.setAttribute('r', nodeR);
    circle.style.pointerEvents = 'none';
    let fill = '#e5e7eb', stroke = 'var(--border)', sw = 1;
    if (p.id === resolvedNodeId) { fill = 'var(--success)'; stroke = 'var(--success)'; sw = 2; }
    else if (activePath.includes(p.id)) { fill = 'var(--accent)'; stroke = 'var(--accent)'; sw = 1.5; }
    circle.setAttribute('fill', fill); circle.setAttribute('stroke', stroke); circle.setAttribute('stroke-width', sw);
    circle.classList.add('minimap-node');

    if (p.id === currentId && !resolvedNodeId) {
      const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
      anim.setAttribute('attributeName', 'r'); anim.setAttribute('values', `${nodeR};${nodeR + 4};${nodeR}`); anim.setAttribute('dur', '1.6s'); anim.setAttribute('repeatCount', 'indefinite');
      circle.appendChild(anim);
    }
    minimapSvg.appendChild(circle);

    hitArea.addEventListener('click', (e) => { e.stopPropagation(); navigateToNode(p.id); });
    hitArea.addEventListener('mouseenter', () => { circle.setAttribute('stroke-width', sw + 2); circle.setAttribute('stroke', sw >= 1.5 ? stroke : 'var(--accent)'); });
    hitArea.addEventListener('mouseleave', () => { circle.setAttribute('stroke-width', sw); circle.setAttribute('stroke', stroke); });
  });

  const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('x', rootX); txt.setAttribute('y', rootY - 10); txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-size', '8'); txt.setAttribute('fill', 'var(--text-secondary)'); txt.setAttribute('font-weight', '600'); txt.textContent = 'Start';
  minimapSvg.appendChild(txt);
}

// ============================================================
// ZOOM & PAN
// ============================================================
let panStartX = 0, panStartY = 0, panStartTx = 0, panStartTy = 0;

function applyZoom(animate = false) {
  const layer = document.getElementById('zoomLayer');
  if (!layer) return;
  const s = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoomScale));
  zoomScale = s;
  layer.style.transform = `translate(${zoomTx}px, ${zoomTy}px) scale(${s})`;
  if (animate) { layer.classList.add('animating'); setTimeout(() => layer.classList.remove('animating'), 350); }
  const label = document.getElementById('zoomLevel');
  if (label) label.textContent = Math.round(s * 100) + '%';
}

function zoomTowards(cx, cy, delta) {
  const oldScale = zoomScale;
  const newScale = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, oldScale + delta * oldScale));
  zoomTx = cx - (cx - zoomTx) * (newScale / oldScale);
  zoomTy = cy - (cy - zoomTy) * (newScale / oldScale);
  zoomScale = newScale;
  applyZoom(false);
}

treeRootEl.addEventListener('wheel', (e) => {
  if (window.innerWidth < 960) return;
  e.preventDefault();
  const rect = treeRootEl.getBoundingClientRect();
  zoomTowards(e.clientX - rect.left, e.clientY - rect.top, e.deltaY > 0 ? -0.08 : 0.08);
}, { passive: false });

treeRootEl.addEventListener('mousedown', (e) => {
  if (window.innerWidth < 960 || e.button !== 0) return;
  if (e.target.closest('.node-card') || e.target.closest('.btn') || e.target.closest('.zoom-controls') || e.target.closest('.result-banner')) return;
  isPanning = true; panStartX = e.clientX; panStartY = e.clientY; panStartTx = zoomTx; panStartTy = zoomTy;
  treeRootEl.classList.add('grabbing'); e.preventDefault();
});
window.addEventListener('mousemove', (e) => { if (!isPanning) return; zoomTx = panStartTx + (e.clientX - panStartX); zoomTy = panStartTy + (e.clientY - panStartY); applyZoom(false); });
window.addEventListener('mouseup', () => { if (isPanning) { isPanning = false; treeRootEl.classList.remove('grabbing'); } });
treeRootEl.addEventListener('dblclick', (e) => {
  if (window.innerWidth < 960) return;
  if (e.target.closest('.node-card') || e.target.closest('.btn') || e.target.closest('.zoom-controls') || e.target.closest('.result-banner')) return;
  zoomScale = 1; zoomTx = 0; zoomTy = 0; applyZoom(true);
});

// Touch pinch zoom
let touchStartDist = 0, touchStartScale = 1, touchStartMidX = 0, touchStartMidY = 0;
treeRootEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) { touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); touchStartScale = zoomScale; touchStartMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2; touchStartMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2; }
}, { passive: false });
treeRootEl.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && touchStartDist > 0) { e.preventDefault(); const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); const ns = touchStartScale * (dist / touchStartDist); const rect = treeRootEl.getBoundingClientRect(); const mx = touchStartMidX - rect.left, my = touchStartMidY - rect.top, os = zoomScale, cl = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, ns)); zoomTx = mx - (mx - zoomTx) * (cl / os); zoomTy = my - (my - zoomTy) * (cl / os); zoomScale = cl; applyZoom(false); }
}, { passive: false });
treeRootEl.addEventListener('touchend', () => { touchStartDist = 0; });

// ============================================================
// IMAGE LIGHTBOX
// ============================================================
let lbScale = 1, lbMinScale = 0.5, lbMaxScale = 5;
let lbPanning = false, lbPanX = 0, lbPanY = 0, lbPanStartX = 0, lbPanStartY = 0;
let lbOverlay = null;

function openLightbox(imgSrc) {
  lbScale = 1; lbPanX = 0; lbPanY = 0;

  lbOverlay = document.createElement('div');
  lbOverlay.className = 'lightbox-overlay';

  const wrap = document.createElement('div');
  wrap.className = 'lightbox-img-wrap';
  wrap.id = 'lbImgWrap';

  const img = document.createElement('img');
  img.src = imgSrc;
  img.alt = '';
  img.draggable = false;
  img.addEventListener('load', () => {
    // Set min scale based on image dimensions so it never gets too tiny
    const naturalW = img.naturalWidth;
    if (naturalW > 0) lbMinScale = Math.max(0.2, 200 / naturalW);
  });

  const closeBtn = document.createElement('button');
  closeBtn.className = 'lightbox-close';
  closeBtn.innerHTML = '✕';
  closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); });

  const toolbar = document.createElement('div');
  toolbar.className = 'lightbox-toolbar';

  const zoomOutBtn = document.createElement('button');
  zoomOutBtn.className = 'lb-btn';
  zoomOutBtn.innerHTML = '−';
  zoomOutBtn.addEventListener('click', (e) => { e.stopPropagation(); lbZoom(-0.3); });

  const zoomLabel = document.createElement('div');
  zoomLabel.className = 'lb-zoom-label';
  zoomLabel.id = 'lbZoomLabel';
  zoomLabel.textContent = '100%';

  const zoomInBtn = document.createElement('button');
  zoomInBtn.className = 'lb-btn';
  zoomInBtn.innerHTML = '+';
  zoomInBtn.addEventListener('click', (e) => { e.stopPropagation(); lbZoom(0.3); });

  const resetBtn = document.createElement('button');
  resetBtn.className = 'lb-btn';
  resetBtn.innerHTML = '↺';
  resetBtn.title = 'Reset zoom';
  resetBtn.addEventListener('click', (e) => { e.stopPropagation(); lbScale = 1; lbPanX = 0; lbPanY = 0; applyLbTransform(); });

  toolbar.appendChild(zoomOutBtn);
  toolbar.appendChild(zoomLabel);
  toolbar.appendChild(zoomInBtn);
  toolbar.appendChild(resetBtn);

  const hint = document.createElement('div');
  hint.className = 'lightbox-hint';
  hint.textContent = 'Scroll to zoom · Drag to pan · Click outside or press Esc to close';

  wrap.appendChild(img);
  wrap.appendChild(closeBtn);
  wrap.appendChild(toolbar);
  wrap.appendChild(hint);
  lbOverlay.appendChild(wrap);

  document.body.appendChild(lbOverlay);

  // Events on overlay background (close on click outside image)
  lbOverlay.addEventListener('click', (e) => {
    if (e.target === lbOverlay) closeLightbox();
  });

  // Events on image wrapper (pan + zoom)
  wrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const delta = e.deltaY > 0 ? -0.15 : 0.15;
    lbZoom(delta);
  }, { passive: false });

  wrap.addEventListener('mousedown', (e) => {
    if (e.button !== 0 || lbScale <= 1) return;
    e.preventDefault();
    e.stopPropagation();
    lbPanning = true;
    lbPanStartX = e.clientX - lbPanX;
    lbPanStartY = e.clientY - lbPanY;
    wrap.style.cursor = 'grabbing';
  });

  window.addEventListener('mousemove', (e) => {
    if (!lbPanning) return;
    lbPanX = e.clientX - lbPanStartX;
    lbPanY = e.clientY - lbPanStartY;
    applyLbTransform();
  });

  window.addEventListener('mouseup', () => {
    if (lbPanning) { lbPanning = false; const w = document.getElementById('lbImgWrap'); if (w) w.style.cursor = lbScale > 1 ? 'grab' : 'default'; }
  });

  // Touch: pinch zoom + single-finger pan (when zoomed)
  let lbTouchStartDist = 0, lbTouchStartScale = 1;
  let lbTouchPanStartX = 0, lbTouchPanStartY = 0;

  wrap.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      lbTouchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      lbTouchStartScale = lbScale;
    } else if (e.touches.length === 1 && lbScale > 1) {
      lbTouchPanStartX = e.touches[0].clientX - lbPanX;
      lbTouchPanStartY = e.touches[0].clientY - lbPanY;
    }
  }, { passive: true });

  wrap.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && lbTouchStartDist > 0) {
      e.preventDefault();
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const newScale = Math.min(lbMaxScale, Math.max(lbMinScale, lbTouchStartScale * (dist / lbTouchStartDist)));
      lbScale = newScale;
      applyLbTransform();
    } else if (e.touches.length === 1 && lbScale > 1 && lbPanning) {
      lbPanX = e.touches[0].clientX - lbTouchPanStartX;
      lbPanY = e.touches[0].clientY - lbTouchPanStartY;
      applyLbTransform();
    }
  }, { passive: false });

  wrap.addEventListener('touchend', (e) => {
    if (e.touches.length === 2) lbTouchStartDist = 0;
  });

  // Escape key
  document.addEventListener('keydown', lbKeyHandler);
}

function lbKeyHandler(e) {
  if (e.key === 'Escape') closeLightbox();
  if (!lbOverlay) return;
  if (e.key === '+' || e.key === '=') lbZoom(0.3);
  if (e.key === '-') lbZoom(-0.3);
  if (e.key === '0') { lbScale = 1; lbPanX = 0; lbPanY = 0; applyLbTransform(); }
}

function lbZoom(delta) {
  lbScale = Math.min(lbMaxScale, Math.max(lbMinScale, lbScale + delta));
  // Reset pan when returning to 1x or below
  if (lbScale <= 1) { lbPanX = 0; lbPanY = 0; }
  applyLbTransform();
}

function applyLbTransform() {
  const wrap = document.getElementById('lbImgWrap');
  if (!wrap) return;
  wrap.style.transform = `scale(${lbScale}) translate(${lbPanX / lbScale}px, ${lbPanY / lbScale}px)`;
  wrap.style.cursor = lbScale > 1 ? (lbPanning ? 'grabbing' : 'grab') : 'default';
  const label = document.getElementById('lbZoomLabel');
  if (label) label.textContent = Math.round(lbScale * 100) + '%';
}

function closeLightbox() {
  if (!lbOverlay) return;
  document.removeEventListener('keydown', lbKeyHandler);
  lbOverlay.classList.add('closing');
  setTimeout(() => {
    if (lbOverlay && lbOverlay.parentNode) lbOverlay.parentNode.removeChild(lbOverlay);
    lbOverlay = null;
    lbPanning = false;
  }, 200);
}

// Delegate click events on images inside the tree
treeRootEl.addEventListener('click', (e) => {
  const img = e.target.closest('.problem-desc img, .solution-steps li img');
  if (img) {
    e.stopPropagation();
    e.preventDefault();
    openLightbox(img.src);
  }
});
