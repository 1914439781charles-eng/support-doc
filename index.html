<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Docs — Search & Browse</title>
  <style>
    :root {
      --color-bg: #f8f9fa;
      --color-surface: #ffffff;
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-text: #1e293b;
      --color-text-muted: #64748b;
      --color-border: #e2e8f0;
      --color-tag-howto: #059669;
      --color-tag-howto-bg: #d1fae5;
      --color-tag-troubleshoot: #d97706;
      --color-tag-troubleshoot-bg: #fef3c7;
      --color-shadow: rgba(0, 0, 0, 0.06);
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 24px 0;
      text-align: center;
      box-shadow: 0 1px 3px var(--color-shadow);
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 4px;
    }
    .header p {
      color: var(--color-text-muted);
      font-size: 15px;
    }

    /* ── Search & Filter Bar ── */
    .toolbar {
      max-width: 860px;
      margin: 32px auto 0;
      padding: 0 20px;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 14px 48px 14px 16px;
      font-size: 16px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      transition: border-color 0.2s;
      outline: none;
    }
    .search-box input:focus {
      border-color: var(--color-primary);
    }
    .search-box .search-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      font-size: 20px;
      pointer-events: none;
    }
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 20px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--color-text);
    }
    .filter-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .filter-btn.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .result-count {
      margin-top: 16px;
      font-size: 14px;
      color: var(--color-text-muted);
    }

    /* ── Article Cards ── */
    .articles {
      max-width: 860px;
      margin: 24px auto 0;
      padding: 0 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      box-shadow: 0 4px 12px var(--color-shadow);
      transform: translateY(-2px);
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    .card-desc {
      color: var(--color-text-muted);
      font-size: 14px;
      margin-bottom: 12px;
    }
    .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag {
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag-howto {
      background: var(--color-tag-howto-bg);
      color: var(--color-tag-howto);
    }
    .tag-troubleshoot {
      background: var(--color-tag-troubleshoot-bg);
      color: var(--color-tag-troubleshoot);
    }

    /* ── Article Detail Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.visible { display: flex; }
    .overlay-panel {
      background: var(--color-surface);
      border-radius: 12px;
      max-width: 720px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      position: relative;
    }
    .overlay-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--color-text-muted);
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .overlay-close:hover { background: var(--color-bg); }
    .overlay-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .overlay-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .overlay-content h2 {
      font-size: 18px;
      font-weight: 700;
      margin: 20px 0 8px;
      color: var(--color-primary);
    }
    .overlay-content h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 16px 0 6px;
    }
    .overlay-content p {
      margin: 6px 0;
    }
    .overlay-content ul, .overlay-content ol {
      margin: 6px 0 6px 24px;
    }
    .overlay-content li {
      margin: 4px 0;
    }
    .overlay-content pre, .overlay-content code {
      background: var(--color-bg);
      border-radius: 4px;
      font-family: "Consolas", "Monaco", monospace;
      font-size: 14px;
    }
    .overlay-content pre {
      padding: 12px 16px;
      margin: 8px 0;
      overflow-x: auto;
    }
    .overlay-content code {
      padding: 2px 6px;
    }
    .overlay-content blockquote {
      border-left: 4px solid var(--color-primary);
      padding-left: 12px;
      color: var(--color-text-muted);
      margin: 8px 0;
    }
    .overlay-content hr {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 16px 0;
    }

    /* ── No Results / Empty State ── */
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-muted);
    }
    .no-results-icon { font-size: 48px; margin-bottom: 12px; }
    .no-results-text { font-size: 16px; }
    .no-results-hint { font-size: 13px; margin-top: 8px; opacity: 0.7; }

    /* ── External-link indicator ── */
    .card-link-icon {
      font-size: 14px;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .header h1 { font-size: 22px; }
      .toolbar { margin-top: 20px; }
      .overlay-panel { padding: 20px; }
      .overlay-title { font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>📖 Support Docs</h1>
    <p>Search and browse How-to guides &amp; Troubleshooting articles</p>
  </div>

  <!-- Search & Filter -->
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search articles by title, keyword, or topic…" autocomplete="off">
      <span class="search-icon">🔍</span>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="howto">📖 How-to</button>
      <button class="filter-btn" data-filter="troubleshoot">🔧 Troubleshooting</button>
    </div>
    <div class="result-count" id="resultCount"></div>
  </div>

  <!-- Article Cards -->
  <div class="articles" id="articleList"></div>

  <!-- Detail Overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <button class="overlay-close" id="overlayClose" title="Close">✕</button>
      <div class="overlay-title" id="overlayTitle"></div>
      <div class="overlay-meta" id="overlayMeta"></div>
      <div class="overlay-content" id="overlayContent"></div>
    </div>
  </div>

  <script>
    // ── Article Data ──
    //
    // Each article supports two modes:
    //   Mode A — "url" mode: set `url` to point to a Jekyll-rendered HTML page.
    //            Clicking the card navigates to that page directly.
    //            Example: url: "how-to/quick-start.html"
    //
    //   Mode B — "content" mode: set `content` to inline HTML string.
    //            Clicking the card opens an overlay panel on this page.
    //
    // Both modes require: id, category ("howto" | "troubleshoot"), title, description, keywords.
    // You may set both `url` and `content`; `url` takes priority.
    //
    const articles = [
      {
        id: "quick-start",
        category: "howto",
        title: "Quick Start Guide",
        description: "Get up and running with the product in minutes.",
        keywords: ["setup", "install", "configuration", "getting started", "environment", "version"],
        url: "how-to/how-to/how-to-customize-dashboard-in-datacake.html"
      },
      {
        id: "common-issues",
        category: "troubleshoot",
        title: "Common Issues & Solutions",
        description: "Frequently encountered problems during installation and runtime, with step-by-step resolution instructions.",
        keywords: ["crash", "permission", "firewall", "network", "proxy", "antivirus", "cache", "disk space", "error", "fail"],
        url: "troubleshooting/common-issues.html"
      },
    ];

    // ── State ──
    let currentFilter = "all";
    let currentQuery = "";

    // ── Render Cards ──
    function renderArticles() {
      const list = document.getElementById("articleList");
      const countEl = document.getElementById("resultCount");

      const filtered = articles.filter(a => {
        const matchCategory = currentFilter === "all" || a.category === currentFilter;
        const q = currentQuery.toLowerCase();
        const matchQuery = !q
          || a.title.toLowerCase().includes(q)
          || a.description.toLowerCase().includes(q)
          || a.keywords.some(k => k.toLowerCase().includes(q))
          || (a.content && a.content.toLowerCase().includes(q));
        return matchCategory && matchQuery;
      });

      countEl.textContent = `${filtered.length} article${filtered.length !== 1 ? "s" : ""} found`;

      if (filtered.length === 0) {
        const isEmpty = articles.length === 0;
        list.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">${currentQuery ? "🔎" : "📂"}</div>
            <div class="no-results-text">
              ${isEmpty
                ? "No articles yet. Convert your .doc files to .md, add them to the repo, then register them here."
                : "No articles match your search. Try different keywords or clear the filter."}
            </div>
            <div class="no-results-hint">
              ${isEmpty
                ? "Workflow: .doc → .md → push to GitHub → add entry to articles array in search.html"
                : ""}
            </div>
          </div>
        `;
        return;
      }

      list.innerHTML = filtered.map(a => `
        <div class="card" data-id="${a.id}">
          <div class="card-title">${a.title}${a.url ? '<span class="card-link-icon">↗</span>' : ''}</div>
          <div class="card-desc">${a.description}</div>
          <div class="card-tags">
            <span class="tag ${a.category === 'howto' ? 'tag-howto' : 'tag-troubleshoot'}">
              ${a.category === "howto" ? "📖 How-to" : "🔧 Troubleshooting"}
            </span>
          </div>
        </div>
      `).join("");

      // Bind click events
      list.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => openArticle(card.dataset.id));
      });
    }

    // ── Open Article Detail ──
    function openArticle(id) {
      const a = articles.find(x => x.id === id);
      if (!a) return;

      // url mode → navigate to the Jekyll-rendered page
      if (a.url) {
        window.location.href = a.url;
        return;
      }

      // content mode → show in overlay
      document.getElementById("overlayTitle").textContent = a.title;
      document.getElementById("overlayMeta").innerHTML = `
        <span class="tag ${a.category === 'howto' ? 'tag-howto' : 'tag-troubleshoot'}">
          ${a.category === "howto" ? "📖 How-to" : "🔧 Troubleshooting"}
        </span>
      `;
      document.getElementById("overlayContent").innerHTML = a.content;
      document.getElementById("overlay").classList.add("visible");
      document.body.style.overflow = "hidden";
    }

    function closeOverlay() {
      document.getElementById("overlay").classList.remove("visible");
      document.body.style.overflow = "";
    }

    // ── Events ──
    document.getElementById("searchInput").addEventListener("input", e => {
      currentQuery = e.target.value.trim();
      renderArticles();
    });

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderArticles();
      });
    });

    document.getElementById("overlayClose").addEventListener("click", closeOverlay);
    document.getElementById("overlay").addEventListener("click", e => {
      if (e.target === document.getElementById("overlay")) closeOverlay();
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeOverlay();
    });

    // ── Initial Render ──
    renderArticles();
  </script>
</body>
</html>
